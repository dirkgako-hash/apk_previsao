name: Asian Odds APK Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
        
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install required packages
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
      
      - name: Generate Android Icons
        run: |
          echo "🎨 Generating Android icons..."
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          
          # Ícone com shield (escudo) para Asian Odds
          for density in hdpi mdpi xhdpi xxhdpi xxxhdpi; do
            case $density in
              mdpi) size="48" ;;
              hdpi) size="72" ;;
              xhdpi) size="96" ;;
              xxhdpi) size="144" ;;
              xxxhdpi) size="192" ;;
            esac
            convert -size ${size}x${size} xc:"#1976D2" -fill "#FFFFFF" -gravity center -pointsize $(($size/3)) -annotate 0 "⚽" "app/src/main/res/mipmap-$density/ic_launcher.png"
            cp "app/src/main/res/mipmap-$density/ic_launcher.png" "app/src/main/res/mipmap-$density/ic_launcher_round.png"
          done
          
          echo "✅ Icons generated!"
      
      - name: Generate Notification Icons
        run: |
          echo "🔔 Generating notification icons..."
          mkdir -p app/src/main/res/drawable
          
          # Criar ícones de notificação (já foram criados localmente, mas garantir)
          cat > app/src/main/res/drawable/ic_bet_notification.xml << 'ICON'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp"
              android:height="24dp"
              android:viewportWidth="24"
              android:viewportHeight="24"
              android:tint="#FFFFFF">
              <path
                  android:fillColor="@android:color/white"
                  android:pathData="M12,2L4,5v6.09c0,5.05 3.41,9.76 8,10.91c4.59,-1.15 8,-5.86 8,-10.91V5L12,2z"/>
          </vector>
          ICON
          
          cp app/src/main/res/drawable/ic_bet_notification.xml app/src/main/res/drawable/ic_monitor.xml
          cp app/src/main/res/drawable/ic_bet_notification.xml app/src/main/res/drawable/ic_bet365.xml
          cp app/src/main/res/drawable/ic_bet_notification.xml app/src/main/res/drawable/ic_details.xml
          cp app/src/main/res/drawable/ic_bet_notification.xml app/src/main/res/drawable/ic_win.xml
          cp app/src/main/res/drawable/ic_bet_notification.xml app/src/main/res/drawable/ic_loss.xml
          
          echo "✅ Notification icons generated!"
      
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      
      - name: Create Release Keystore
        run: |
          echo "🔐 Creating release keystore..."
          keytool -genkeypair \
            -keystore asianbets.jks \
            -alias asianbets_key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass AsianOdds2024! \
            -keypass AsianOdds2024! \
            -dname "CN=Asian Odds, OU=Robo Dirosky, O=Dirosky, L=Lisboa, ST=Lisboa, C=PT" \
            -noprompt
          
          echo "storePassword=AsianOdds2024!" > keystore.properties
          echo "keyPassword=AsianOdds2024!" >> keystore.properties
          echo "keyAlias=asianbets_key" >> keystore.properties
          echo "storeFile=../asianbets.jks" >> keystore.properties
          
          echo "✅ Release keystore created!"
      
      - name: Build Debug APK (primeiro teste)
        run: |
          echo "🔨 Building Debug APK..."
          ./gradlew assembleDebug --stacktrace
          echo "✅ Debug APK built successfully!"
      
      - name: Build Release APK
        run: |
          echo "🚀 Building Release APK..."
          export VERSION_CODE=${{ github.run_number }}
          export VERSION_NAME=1.0.${{ github.run_number }}
          
          ./gradlew assembleRelease --stacktrace
          echo "✅ Release APK built successfully!"
      
      - name: Rename APKs
        run: |
          echo "📦 Renaming APKs..."
          
          # Debug
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            mv app/build/outputs/apk/debug/app-debug.apk \
               app/build/outputs/apk/debug/AsianOdds-RoboDirosky-v1.0.${{ github.run_number }}-debug.apk
          fi
          
          # Release
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            mv app/build/outputs/apk/release/app-release.apk \
               app/build/outputs/apk/release/AsianOdds-RoboDirosky-v1.0.${{ github.run_number }}-release.apk
          fi
          
          echo "✅ APKs renamed!"
      
      - name: Verify APKs
        run: |
          echo "🔍 Verifying generated APKs..."
          
          echo "=== Debug APK ==="
          find app/build/outputs/apk/debug -name "*.apk" -type f | xargs -I {} sh -c 'echo "{} - $(du -h {} | cut -f1)"'
          
          echo ""
          echo "=== Release APK ==="
          find app/build/outputs/apk/release -name "*.apk" -type f | xargs -I {} sh -c 'echo "{} - $(du -h {} | cut -f1)"'
          
          echo ""
          echo "=== Verifying signatures ==="
          for apk in app/build/outputs/apk/release/*.apk; do
            if [ -f "$apk" ]; then
              echo "Verifying $apk..."
              apksigner verify --verbose "$apk" 2>/dev/null || echo "⚠️ Signature verification skipped"
            fi
          done
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: AsianOdds-Debug-v1.0.${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 7
      
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: AsianOdds-Release-v1.0.${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 90
      
      - name: Create Release Summary
        run: |
          echo "# 🎯 Asian Odds - Robo Dirosky APK Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📦 Build Info" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: 1.0.${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Number**: ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ✅ Features" >> $GITHUB_STEP_SUMMARY
          echo "- BeVIX-1 ∩ TNT-A Filter (100% Python compatible)" >> $GITHUB_STEP_SUMMARY
          echo "- Android Notifications (replaces Telegram)" >> $GITHUB_STEP_SUMMARY
          echo "- Foreground Service (24/7 monitoring)" >> $GITHUB_STEP_SUMMARY
          echo "- Room Database (SQLite)" >> $GITHUB_STEP_SUMMARY
          echo "- Retrofit API Client" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📲 Download" >> $GITHUB_STEP_SUMMARY
          echo "APKs available in workflow artifacts above ⬆️" >> $GITHUB_STEP_SUMMARY
